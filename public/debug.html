<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - Splityfy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body style="padding: 20px; font-family: Arial, sans-serif;">
  <h1>Debug: My Expenses</h1>
  <button onclick="loadDebug()">Load Debug Info</button>
  <pre id="debugOutput" style="background: #f5f5f5; padding: 20px; border-radius: 8px; overflow: auto;"></pre>
  
  <h2>Current User</h2>
  <pre id="userInfo" style="background: #e0f2fe; padding: 20px; border-radius: 8px;"></pre>

  <script src="js/auth.js"></script>
  <script>
    const currentUser = getUser();
    document.getElementById('userInfo').textContent = JSON.stringify(currentUser, null, 2);
    
    async function loadDebug() {
      try {
        const response = await fetch('/api/debug/my-expenses', {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        const data = await response.json();
        document.getElementById('debugOutput').textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById('debugOutput').textContent = 'Error: ' + error.message;
      }
    }
    
    loadDebug();
  </script>
</body>
</html>
