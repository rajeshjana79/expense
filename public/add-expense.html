<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add/Remove Expense - Splityfy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="Splityfy" class="logo-img">
        <span>Splityfy</span>
      </a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="dashboard-mobile-header" style="display: none;">
      <span style="font-weight: 600; font-size: 1.1rem;">Menu</span>
      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    <aside class="sidebar">
      <div class="user-info">
        <h3 id="userName">User</h3>
        <p id="userEmail">user@email.com</p>
      </div>
      <ul class="sidebar-menu">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="groups.html">Groups</a></li>
        <li><a href="add-expense.html" class="active">Add/Remove Expense</a></li>
        <li><a href="add-member.html">Add/Remove Member</a></li>
        <li><a href="settlement.html">Settlement</a></li>
      </ul>
    </aside>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h1>Add Expense</h1>
      </div>

      <div class="expense-form">
        <h2>Add Expense</h2>
        <p style="color: #6b7280; margin-bottom: 24px;">Select a group and enter expense details to add an expense.</p>
        <form id="expenseForm">
          <div class="form-group">
            <label for="groupSelect">Select Group</label>
            <select id="groupSelect" name="groupSelect" required>
              <option value="">Choose a group</option>
            </select>
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" placeholder="What was this expense for?" required>
          </div>

          <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="0.00" required>
          </div>

          <div class="form-group">
            <label for="paidBy">Paid By</label>
            <select id="paidBy" name="paidBy" required>
              <option value="">Select who paid</option>
            </select>
          </div>

          <button type="submit" class="btn-primary">Add Expense</button>
        </form>
      </div>

      <div class="expense-form" style="margin-top: 32px;">
        <h2>Remove Expense</h2>
        <p style="color: #6b7280; margin-bottom: 24px;">Select a group and choose an expense to remove it.</p>
        <form id="removeExpenseForm">
          <div class="form-group">
            <label for="removeGroupSelect">Select Group</label>
            <select id="removeGroupSelect" name="removeGroupSelect" required>
              <option value="">Choose a group</option>
            </select>
          </div>

          <div class="form-group">
            <label for="expenseSelect">Select Expense</label>
            <select id="expenseSelect" name="expenseSelect" required>
              <option value="">Select an expense</option>
            </select>
          </div>

          <button type="submit" class="btn-primary" style="background-color: #dc2626;">Remove Expense</button>
        </form>
      </div>
    </main>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/expense.js"></script>
  <script>
    function toggleMobileMenu() {
      document.querySelector('.sidebar').classList.toggle('active');
    }
  </script>
</body>
</html>
